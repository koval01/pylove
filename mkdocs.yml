site_name: LovensePy
site_description: Python client for the Lovense API
site_url: https://koval01.github.io/lovensepy/
repo_url: https://github.com/koval01/lovensepy
repo_name: lovensepy
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

copyright: Copyright &copy; LovensePy contributors &mdash; <a href="https://github.com/koval01/lovensepy/blob/main/LICENSE">Apache License 2.0</a>

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Changelog: changelog.md
  - Installation: installation.md
  - Connection methods: connection-methods.md
  - Direct BLE: direct-ble.md
  - Tutorials:
      - LAN & BLE hub: tutorials/lan.md
      - Server + QR: tutorials/server-qr.md
      - Socket API: tutorials/socket.md
      - Toy Events: tutorials/toy-events.md
      - Home Assistant MQTT: tutorials/home-assistant-mqtt.md
      - FastAPI LAN REST: tutorials/fastapi-lan-rest.md
  - API Reference: api-reference.md
  - Appendix: appendix.md

extra:
  generator: false
