name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pylint bandit pip-audit

      - name: Run Ruff
        run: ruff check lovensepy tests && ruff format --check lovensepy tests

      - name: Run unit tests
        run: pytest tests/test_unit.py -v

      - name: Run pylint
        run: pylint lovensepy

      - name: Run bandit
        run: bandit -r lovensepy -f txt

      - name: Run semgrep
        run: semgrep scan --config auto lovensepy --error

      - name: Check dependencies for vulnerabilities
        run: pip-audit
