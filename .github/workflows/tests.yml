name: Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check lovensepy tests && ruff format --check lovensepy tests

      - name: Run unit and fast tests (with coverage)
        run: |
          pytest \
            tests/test_unit.py \
            tests/test_async_clients.py \
            tests/test_socket_client_unit.py \
            tests/test_home_assistant_mqtt_unit.py \
            tests/test_ble_direct_unit.py \
            tests/test_ble_direct_hub_unit.py \
            tests/test_ble_direct_sync_hub_unit.py \
            tests/test_uart_replies.py \
            tests/test_ble_uart_catalog.py \
            tests/test_transport_ws_unit.py \
            tests/test_socket_api_cleanup_unit.py \
            tests/test_service_fastapi.py \
            tests/test_ble_scan_advertisements.py \
            -v --cov=lovensepy --cov-report=term-missing

      - name: Run pylint
        run: pylint lovensepy

      - name: Run bandit
        run: bandit -r lovensepy -f txt

      - name: Run semgrep
        run: semgrep scan --config auto lovensepy --error

      - name: Check dependencies for vulnerabilities
        run: pip-audit
