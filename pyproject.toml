[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lovensepy"
version = "1.0.4"
description = "Python Lovense API client"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "websockets>=12.0",
    "hyperframe>=6.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.8.0",
]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["lovensepy", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = [
    "N815",  # mixedCase - Lovense API uses camelCase (nickName, etc.)
    "N806",  # camelCase variables - API/JSON field names
]

[tool.ruff.lint.isort]
known-first-party = ["lovensepy"]

[tool.setuptools.package-data]
lovensepy = ["py.typed"]

[tool.setuptools.packages.find]
include = ["lovensepy*"]
